<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube AI Assistant</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="noise"></div>

    <div class="container">

        <div class="header">
            <div class="header-top">
                <div class="logo-mark">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M3 9C3 5.686 5.686 3 9 3s6 2.686 6 6-2.686 6-6 6-6-2.686-6-6z" fill="#FF2D2D" opacity="0.2"/>
                        <path d="M7.5 6.5l4 2.5-4 2.5V6.5z" fill="#FF2D2D"/>
                    </svg>
                </div>
                <h1>YT Assistant</h1>
                <div class="live-dot">
                    <span class="dot-pulse"></span>
                    <span>Live</span>
                </div>
            </div>
            <p class="subtitle">Hey Vaibhav — ask anything about this video</p>
        </div>

        <div id="chatContainer">
            <div class="empty-state">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="18" r="17" stroke="#FF2D2D" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
                    <path d="M13 18C13 15.239 15.239 13 18 13s5 2.239 5 5-2.239 5-5 5-5-2.239-5-5z" fill="#FF2D2D" opacity="0.15"/>
                    <path d="M15.5 15.5l6 2.5-6 2.5v-5z" fill="#FF2D2D" opacity="0.6"/>
                </svg>
                <p>Your conversation will<br>appear here</p>
            </div>
        </div>

        <div class="input-section">
            <div class="textarea-wrapper">
                <textarea
                    id="questionInput"
                    placeholder="Ask something about this video…"
                    rows="1"
                ></textarea>
                <button id="askBtn" aria-label="Send">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 8l12-6-4 6 4 6-12-6z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <p class="hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for newline</p>
        </div>

    </div>

    <script src="popup.js"></script>
</body>
</html>
